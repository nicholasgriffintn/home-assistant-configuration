trigger_speech:
  mode: queued
  sequence:
    - condition: and
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity_id: alarm_control_panel.london_alarm
              state: 'disarmed'
            - condition: state
              entity_id: input_boolean.guest_mode_lm
              state: 'on'
        - condition: or
          conditions:
            - condition: and
              conditions:
                - condition: time
                  after: '08:00:00'
                  before: '22:00:00'
            - condition: state
              entity_id: input_boolean.alert_mode
              state: 'on'
        - condition: state
          entity_id: input_boolean.speech_notifications
          state: 'on'
        - condition: template
          value_template: "{{ not is_state('assist_satellite.home_assistant_voice_093870_assist_satellite', 'unavailable') }}"

    - service: media_player.volume_set
      data:
        entity_id: >-
          {% set media_player = media_player | default([], true) %}
          {% if media_player | length == 0 %}
            {% set media_player = [
              'media_player.home_assistant_voice_093870_media_player'
            ] %}
          {% endif %}
          {% if media_player is not string and media_player is sequence %}
            {% set media_player = media_player|join(', ') %}
          {% endif %}
          {{ media_player }}
        volume_level: >-
          {% if now().strftime('%H')|int < 12 and now().strftime('%H')|int > 6 %}
            0.7
          {% elif now().strftime('%H')|int > 12 and now().strftime('%H')|int < 22 %}
            0.9
          {% else %}
            0.45
          {% endif %}

    - action: assist_satellite.announce
      data:
        message: "{{ speech_message | default('') }}"
        preannounce: true
      target:
        device_id: b2cd7d49f45144ddb35b315ebced9c2e
