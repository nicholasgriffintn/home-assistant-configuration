adaptive_lighting_day_mode:
  alias: "Adaptive Lighting: Day mode"
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.adaptive_lighting_bedroom_adaptive_lighting
          - switch.adaptive_lighting_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_living_room_adaptive_lighting
    - service: switch.turn_off
      target:
        entity_id:
          - switch.adaptive_lighting_sleep_mode_bedroom_adaptive_lighting
          - switch.adaptive_lighting_sleep_mode_living_room_adaptive_lighting

adaptive_lighting_scene_mode:
  alias: "Adaptive Lighting: Scene mode"
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.adaptive_lighting_bedroom_adaptive_lighting
          - switch.adaptive_lighting_living_room_adaptive_lighting
    - service: switch.turn_off
      target:
        entity_id:
          - switch.adaptive_lighting_sleep_mode_bedroom_adaptive_lighting
          - switch.adaptive_lighting_sleep_mode_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_living_room_adaptive_lighting

adaptive_lighting_sleep_mode:
  alias: "Adaptive Lighting: Sleep mode"
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.adaptive_lighting_bedroom_adaptive_lighting
          - switch.adaptive_lighting_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_color_living_room_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_bedroom_adaptive_lighting
          - switch.adaptive_lighting_adapt_brightness_living_room_adaptive_lighting
          - switch.adaptive_lighting_sleep_mode_bedroom_adaptive_lighting
          - switch.adaptive_lighting_sleep_mode_living_room_adaptive_lighting
