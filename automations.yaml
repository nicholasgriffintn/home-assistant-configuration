- id: '1663619981748'
  alias: Turn on bedroom spot on motion
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.bedroom
    from: 'off'
    to: 'on'
    trigger: state
  - trigger: state
    entity_id:
    - input_boolean.iphone_charging
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: time
    after: '17:00:00'
    before: 09:00:00
  - condition: device
    type: is_off
    device_id: 698f5064f1b18c46a302de08f8424974
    entity_id: light.wiz_rgbww_tunable_020656
    domain: light
  - condition: device
    type: is_off
    device_id: 049c1ead6b2b656db204fe8e995653a8
    entity_id: 03c53d99b847896f1f8d6d4cca1b09e3
    domain: light
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  actions:
  - parallel:
    - type: turn_on
      device_id: 698f5064f1b18c46a302de08f8424974
      entity_id: light.wiz_rgbww_tunable_020656
      domain: light
      brightness_pct: 30
    - type: turn_on
      device_id: b25a6f1fdcef0b052e57805c536ab8e2
      entity_id: f1e5e29893be5fc2b4e3360ddf2b45a4
      domain: light
      brightness_pct: 30
  - if:
    - condition: state
      entity_id: input_boolean.iphone_charging
      state: 'off'
    then:
    - wait_for_trigger:
      - trigger: state
        entity_id:
        - input_boolean.iphone_charging
        to: 'on'
        for:
          hours: 0
          minutes: 0
          seconds: 1
    else:
    - wait_for_trigger:
      - trigger: state
        entity_id:
        - binary_sensor.bedroom
        to: 'off'
        from: 'on'
        for:
          hours: 0
          minutes: 1
          seconds: 0
  - parallel:
    - type: turn_off
      device_id: 698f5064f1b18c46a302de08f8424974
      entity_id: light.wiz_rgbww_tunable_020656
      domain: light
    - type: turn_off
      device_id: b25a6f1fdcef0b052e57805c536ab8e2
      entity_id: f1e5e29893be5fc2b4e3360ddf2b45a4
      domain: light
  mode: single
