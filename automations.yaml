- alias: Send Guard Dog
  id: send_guard_dog
  trigger:
  - platform: state
    entity_id: input_boolean.send_guard_dog
    to: 'on'
    from: 'off'
  condition:
  - condition: state
    entity_id: alarm_control_panel.london_alarm
    state: away
