- id: '1775527344212'
  alias: 'HA Core: Auto-update patch versions'
  description: ''
  triggers:
  - trigger: time_pattern
    hours: /4
  conditions:
  - condition: state
    entity_id: update.home_assistant_core_update
    state: 'on'
  - condition: template
    value_template: '{{ state_attr("update.home_assistant_core_update", "installed_version")[0:7]
      == state_attr("update.home_assistant_core_update", "latest_version")[0:7] }}'
  - condition: zone
    entity_id: person.nicholas_griffin
    zone: zone.home
  - condition: state
    entity_id: input_boolean.guest_mode_lm
    state:
    - 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  actions:
  - action: notify.mobile_app_ng_iphone
    metadata: {}
    data:
      message: Starting an automatic update
  - action: update.install
    target:
      entity_id: update.home_assistant_core_update
    data: {}
  mode: single
