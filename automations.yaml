      device_id: 698f5064f1b18c46a302de08f8424974
      entity_id: light.wiz_rgbww_tunable_020656
      domain: light
    - type: turn_off
      device_id: b25a6f1fdcef0b052e57805c536ab8e2
      entity_id: f1e5e29893be5fc2b4e3360ddf2b45a4
      domain: light
  mode: single
