    from: 'off'
    to: 'on'
  condition: []
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.home_mode
  - device_id: a7fe10c4353ad14df685757cd9b4c2a3
    domain: alarm_control_panel
    entity_id: alarm_control_panel.london_alarm
    type: arm_away
  - service: script.music_stop_house
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.away_mode
  mode: single
- id: '1644172973947'
  alias: Home mode trigger
  description: Arm home and reset the helper.
