- id: sync_iphone_charging_helper
  alias: Sync iPhone charging helper
  description: Keep the iPhone charging helper aligned with the mobile app battery-state sensor.
  trigger:
  - platform: state
    entity_id: sensor.ng_iphone_battery_state
  - platform: homeassistant
    event: start
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ states('sensor.ng_iphone_battery_state') | lower in ['charging', 'full'] }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.iphone_charging
    - conditions:
      - condition: template
        value_template: "{{ states('sensor.ng_iphone_battery_state') | lower in ['not charging', 'discharging', 'unplugged'] }}"
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.iphone_charging
  mode: single
- id: '1644180357751'
  alias: Arm Home when iPhone is Plugged In
  description: ''
  trigger:
  - platform: state
    entity_id: input_boolean.iphone_charging
    from: 'off'
    to: 'on'
  condition:
  - condition: state
    entity_id: alarm_control_panel.london_alarm
    state: disarmed
  - condition: time
    after: '20:00:00'
    before: 09:00:00
  action:
  - if:
    - condition: state
      entity_id: binary_sensor.front_door_2
      state: 'off'
    then:
    - device_id: a7fe10c4353ad14df685757cd9b4c2a3
      domain: alarm_control_panel
      entity_id: alarm_control_panel.london_alarm
      type: arm_home
    else:
    - wait_for_trigger:
      - platform: state
        entity_id: binary_sensor.front_door_2
        to: 'off'
        for:
          hours: 0
          minutes: 0
          seconds: 15
      timeout:
        minutes: 10
      continue_on_timeout: false
    - device_id: a7fe10c4353ad14df685757cd9b4c2a3
      domain: alarm_control_panel
      entity_id: alarm_control_panel.london_alarm
      type: arm_home
  mode: single
