- id: daily_plant_watering_reminder
  alias: Daily plant watering reminder
  description: Remind me when Simple Plant says anything needs watering.
  trigger:
  - platform: time
    at: '09:30:00'
  condition:
  - condition: numeric_state
    entity_id: sensor.plants_to_water
    above: 0
  - condition: state
    entity_id: alarm_control_panel.london_alarm
    state: disarmed
  - condition: state
    entity_id: input_boolean.plant_reminder_snoozed
    state: 'off'
  action:
  - service: script.text_notification
    data:
      title: Plants need water
      value1: >-
        {{ states('sensor.plants_to_water') }} plant{{ 's' if
        states('sensor.plants_to_water') | int(0) != 1 else '' }} need water:
        {% set due = namespace(names=[]) %}
        {% if is_state('binary_sensor.simple_plant_todo_spike', 'on') %}
          {% set due.names = due.names + ['Spike'] %}
        {% endif %}
        {% if is_state('binary_sensor.simple_plant_todo_susie', 'on') %}
          {% set due.names = due.names + ['Susie'] %}
        {% endif %}
        {% if is_state('binary_sensor.simple_plant_todo_wallace', 'on') %}
          {% set due.names = due.names + ['Wallace'] %}
        {% endif %}
        {{ due.names | join(', ') }}
      group: plants
      tag: plants-water
      url: entityId:sensor.plants_to_water
      actions:
      - action: PLANT_MARK_SPIKE_WATERED
        title: Spike watered
        icon: sfsymbols:drop
      - action: PLANT_MARK_SUSIE_WATERED
        title: Susie watered
        icon: sfsymbols:drop
      - action: PLANT_MARK_WALLACE_WATERED
        title: Wallace watered
        icon: sfsymbols:drop
      - action: PLANT_REMIND_LATER
        title: Later
        icon: sfsymbols:clock
  mode: single
- id: daily_watch_battery_reminder
  alias: Daily watch battery reminder
  description: Remind me in the morning if the watch is nearly flat.
  trigger:
  - platform: time
    at: 08:30:00
  condition:
  - condition: numeric_state
    entity_id: sensor.ng_iphone_watch_battery_level
    below: 15
  action:
  - service: script.text_notification
    data:
      title: Watch battery low
      value1: >-
        Your watch is at {{ states('sensor.ng_iphone_watch_battery_level') }}%.
      group: devices
      url: entityId:sensor.ng_iphone_watch_battery_level
  mode: single
- id: high_indoor_co2_alert
  alias: High indoor CO2 alert
  description: Tell me when the living space needs fresh air.
  trigger:
  - platform: numeric_state
    entity_id: sensor.weather_station_carbon_dioxide
    above: 1200
    for:
      minutes: 20
  condition:
  - condition: state
    entity_id: alarm_control_panel.london_alarm
    state: disarmed
  - condition: state
    entity_id: input_boolean.air_quality_snoozed
    state: 'off'
  action:
  - service: script.text_notification
    data:
      title: Open a window
      value1: >-
        Indoor CO2 has been around {{ states('sensor.weather_station_carbon_dioxide') }}
        ppm for 20 minutes.
      group: air-quality
      level: time-sensitive
      is_critical: true
      tag: air-quality
      url: entityId:sensor.weather_station_carbon_dioxide
      actions:
      - action: AIR_QUALITY_BOOST_NOW
        title: Boost fan
        icon: sfsymbols:fan
      - action: AIR_QUALITY_SNOOZE_2H
        title: Ignore 2h
        icon: sfsymbols:moon
  mode: single
- id: commute_tube_disruption_alert
  alias: Commute Tube disruption alert
  description: Flag useful Underground disruptions during commute windows.
  trigger:
  - platform: state
    entity_id:
    - sensor.london_underground_central
    - sensor.london_underground_circle
    - sensor.london_underground_elizabeth_line
    - sensor.london_underground_hammersmith_city
  condition:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['Good Service', 'unknown', 'unavailable'] }}"
  - condition: state
    entity_id: input_boolean.commute_alerts_muted_today
    state: 'off'
  - condition: or
    conditions:
    - condition: time
      after: 07:00:00
      before: '10:00:00'
      weekday:
      - thu
    - condition: time
      after: '16:30:00'
      before: '19:30:00'
      weekday:
      - thu
  action:
  - service: script.text_notification
    data:
      title: Tube disruption
      value1: >-
        {{ trigger.to_state.attributes.friendly_name | replace('London Underground ', '') }}:
        {{ trigger.to_state.state }}.
      group: commute
      level: time-sensitive
      is_critical: true
      tag: commute-status
      url: https://tfl.gov.uk/tube-dlr-overground/status/
      actions:
      - action: COMMUTE_MUTE_TODAY
        title: Mute today
        icon: sfsymbols:bell.slash
  mode: queued
- id: reset_daily_mode_toggles
  alias: Reset daily mode toggles
  description: Clear scene-style helper toggles every morning.
  trigger:
  - platform: time
    at: 07:00:00
  action:
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.wind_down
      - input_boolean.bedtime
      - input_boolean.good_night
      - input_boolean.watching_tv
      - input_boolean.send_guard_dog
      - input_boolean.air_quality_snoozed
      - input_boolean.commute_alerts_muted_today
      - input_boolean.plant_reminder_snoozed
  - service: script.adaptive_lighting_day_mode
  mode: single
- id: air_quality_boost_on
  alias: Air quality boost on
  description: Boost the fan when CO2 stays high while someone is home.
  trigger:
  - platform: numeric_state
    entity_id: sensor.weather_station_carbon_dioxide
    above: 1400
    for:
      minutes: 10
  condition:
  - condition: state
    entity_id: alarm_control_panel.london_alarm
    state: disarmed
  - condition: state
    entity_id: input_boolean.air_quality_boost
    state: 'off'
  - condition: state
    entity_id: input_boolean.air_quality_snoozed
    state: 'off'
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.air_quality_boost
  - service: fan.turn_on
    target:
      entity_id: fan.air_circulator
  - service: fan.set_percentage
    target:
      entity_id: fan.air_circulator
    data:
      percentage: 60
  - service: script.text_notification
    data:
      title: Air quality boost started
      value1: >-
        CO2 is {{ states('sensor.weather_station_carbon_dioxide') }} ppm, so the fan is running at 60%.
      group: air-quality
      tag: air-quality
      url: entityId:fan.air_circulator
      actions:
      - action: AIR_QUALITY_STOP_BOOST
        title: Stop boost
        icon: sfsymbols:fan.slash
      - action: AIR_QUALITY_SNOOZE_2H
        title: Ignore 2h
        icon: sfsymbols:moon
  mode: single
- id: air_quality_boost_off
  alias: Air quality boost off
  description: Stop only the fan boost that Home Assistant started.
  trigger:
  - platform: numeric_state
    entity_id: sensor.weather_station_carbon_dioxide
    below: 900
    for:
      minutes: 20
  condition:
  - condition: state
    entity_id: input_boolean.air_quality_boost
    state: 'on'
  action:
  - service: fan.turn_off
    target:
      entity_id: fan.air_circulator
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.air_quality_boost
  - service: script.text_notification
    data:
      title: Air quality back to normal
      value1: >-
        CO2 is back down to {{ states('sensor.weather_station_carbon_dioxide') }} ppm, so the fan boost has stopped.
      group: air-quality
      url: entityId:sensor.weather_station_carbon_dioxide
  mode: single
- id: wind_down_routine
  alias: Wind Down routine
  description: Set low evening lighting and clear conflicting modes.
  trigger:
  - platform: state
    entity_id: input_boolean.wind_down
    from: 'off'
    to: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.bedtime
      - input_boolean.good_morning
      - input_boolean.good_night
      - input_boolean.watching_tv
  - service: script.adaptive_lighting_scene_mode
  - service: scene.turn_on
    target:
      entity_id:
      - scene.lr_wind_down
      - scene.br_wind_down
      - scene.hr_wind_down
    data:
      transition: 6
  mode: single
- id: scene_mode_toggle_off
  alias: Scene mode toggle off
  description: Restore Adaptive Lighting when the persistent scene modes are cleared manually.
  trigger:
  - platform: state
    entity_id:
    - input_boolean.wind_down
    - input_boolean.watching_tv
    from: 'on'
    to: 'off'
  condition:
  - condition: state
    entity_id: input_boolean.bedtime
    state: 'off'
  - condition: state
    entity_id: input_boolean.good_morning
    state: 'off'
  - condition: state
    entity_id: input_boolean.good_night
    state: 'off'
  - condition: state
    entity_id: input_boolean.wind_down
    state: 'off'
  - condition: state
    entity_id: input_boolean.watching_tv
    state: 'off'
  action:
  - service: script.adaptive_lighting_day_mode
  mode: restart
- id: good_night_routine
  alias: Good Night routine
  description: Turn the house down, set bedtime mode, and arm home if the front door is shut.
  trigger:
  - platform: state
    entity_id: input_boolean.good_night
    from: 'off'
    to: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.good_morning
      - input_boolean.wind_down
      - input_boolean.watching_tv
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.bedtime
  - service: script.adaptive_lighting_scene_mode
  - service: script.music_stop_house
  - service: scene.turn_on
    target:
      entity_id:
      - scene.lr_good_night
      - scene.hr_good_night
      - scene.br_good_night
    data:
      transition: 8
  - if:
    - condition: state
      entity_id: alarm_control_panel.london_alarm
      state: disarmed
    - condition: state
      entity_id: binary_sensor.front_door_2
      state: 'off'
    then:
    - device_id: a7fe10c4353ad14df685757cd9b4c2a3
      domain: alarm_control_panel
      entity_id: alarm_control_panel.london_alarm
      type: arm_home
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.good_night
  mode: single
- id: good_morning_routine
  alias: Good Morning routine
  description: Clear night modes and send the morning briefing.
  trigger:
  - platform: state
    entity_id: input_boolean.good_morning
    from: 'off'
    to: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.bedtime
      - input_boolean.wind_down
      - input_boolean.good_night
      - input_boolean.watching_tv
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.london_alarm
        state: disarmed
    then:
    - device_id: a7fe10c4353ad14df685757cd9b4c2a3
      domain: alarm_control_panel
      entity_id: alarm_control_panel.london_alarm
      type: disarm
  - service: script.adaptive_lighting_day_mode
  - service: scene.turn_on
    target:
      entity_id: scene.br_good_morning
    data:
      transition: 8
  - parallel:
    - service: script.text_notification
      data:
        title: Morning Briefing
        subtitle: Weather, air quality and commute
        value1: "{{ states('sensor.morning_announcement') }}"
        group: briefing
        tag: morning-briefing
        url: entityId:sensor.morning_announcement
        message_limit: 180
        actions:
        - action: MUSIC_PLAY_RADIO_1
          title: Radio 1
          icon: sfsymbols:radio
        - action: MORNING_READ_ALOUD
          title: Read aloud
          icon: sfsymbols:speaker.wave.2
    - service: script.briefing_notification
      data:
        call_inside_weather: 1
        call_garbage_day: 1
        call_outside_weather: 1
        call_light_check: 1
    - service: script.music_play_morning_bbc_radio_1
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.good_morning
  mode: single
- id: commute_morning_status
  alias: Commute morning status
  description: Send a weekday commute summary if useful Tube lines are disrupted.
  trigger:
  - platform: time
    at: 07:45:00
  condition:
  - condition: time
    weekday:
    - thu
  - condition: template
    value_template: >-
      {{ [
        states('sensor.london_underground_central'),
        states('sensor.london_underground_circle'),
        states('sensor.london_underground_elizabeth_line'),
        states('sensor.london_underground_hammersmith_city'),
        states('sensor.london_underground_piccadilly')
      ] | reject('eq', 'Good Service') | reject('eq', 'unknown') | reject('eq', 'unavailable') | list | count > 0 }}
  - condition: state
    entity_id: input_boolean.commute_alerts_muted_today
    state: 'off'
  action:
  - service: script.text_notification
    data:
      title: Commute status
      value1: >-
        {% set lines = [
          ('Central', states('sensor.london_underground_central')),
          ('Circle', states('sensor.london_underground_circle')),
          ('Elizabeth line', states('sensor.london_underground_elizabeth_line')),
          ('Hammersmith & City', states('sensor.london_underground_hammersmith_city')),
          ('Piccadilly', states('sensor.london_underground_piccadilly'))
        ] %}
        {% set disrupted = namespace(items=[]) %}
        {% for line, status in lines %}
          {% if status not in ['Good Service', 'unknown', 'unavailable'] %}
            {% set disrupted.items = disrupted.items + [line ~ ': ' ~ status] %}
          {% endif %}
        {% endfor %}
        {{ disrupted.items | join('; ') }}
      group: commute
      level: time-sensitive
      is_critical: true
      tag: commute-status
      url: https://tfl.gov.uk/tube-dlr-overground/status/
      actions:
      - action: COMMUTE_MUTE_TODAY
        title: Mute today
        icon: sfsymbols:bell.slash
  mode: single
- id: mobile_notification_actions
  alias: Mobile notification actions
  description: Handle buttons tapped from Home Assistant mobile notifications.
  trigger:
  - platform: event
    event_type: mobile_app_notification_action
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'PLANT_MARK_SPIKE_WATERED' }}"
      sequence:
      - service: button.press
        target:
          entity_id: button.simple_plant_mark_watered_spike
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'PLANT_MARK_SUSIE_WATERED' }}"
      sequence:
      - service: button.press
        target:
          entity_id: button.simple_plant_mark_watered_susie
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'PLANT_MARK_WALLACE_WATERED' }}"
      sequence:
      - service: button.press
        target:
          entity_id: button.simple_plant_mark_watered_wallace
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'PLANT_REMIND_LATER' }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.plant_reminder_snoozed
      - delay:
          hours: 3
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.plant_reminder_snoozed
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'AIR_QUALITY_BOOST_NOW' }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.air_quality_boost
      - service: fan.turn_on
        target:
          entity_id: fan.air_circulator
      - service: fan.set_percentage
        target:
          entity_id: fan.air_circulator
        data:
          percentage: 60
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'AIR_QUALITY_STOP_BOOST' }}"
      sequence:
      - service: fan.turn_off
        target:
          entity_id: fan.air_circulator
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.air_quality_boost
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'AIR_QUALITY_SNOOZE_2H' }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.air_quality_snoozed
      - delay:
          hours: 2
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.air_quality_snoozed
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'COMMUTE_MUTE_TODAY' }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.commute_alerts_muted_today
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'MORNING_READ_ALOUD' }}"
      sequence:
      - service: script.briefing_notification
        data:
          call_inside_weather: 1
          call_garbage_day: 1
          call_outside_weather: 1
          call_light_check: 1
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'GOOD_MORNING_RUN' }}"
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.good_morning
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'MUSIC_PLAY_RADIO_1' }}"
      sequence:
      - service: script.music_play_morning_bbc_radio_1
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'MUSIC_PAUSE_HOUSE' }}"
      sequence:
      - service: script.music_pause_house
    - conditions:
      - condition: template
        value_template: "{{ trigger.event.data.action == 'MUSIC_STOP_HOUSE' }}"
      sequence:
      - service: script.music_stop_house
  mode: parallel
  max: 10
