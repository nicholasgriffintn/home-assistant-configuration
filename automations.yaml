  - service: script.dog_bark
  - delay:
      minutes: 10
  - service: input_boolean.turn_off
    entity_id: input_boolean.send_guard_dog
- alias: Watching TV
  id: watching_tv
  trigger:
  - platform: state
    entity_id: input_boolean.watching_tv
    to: 'on'
    from: 'off'
    id: manual
  - platform: state
    entity_id: sun.sun
    to: below_horizon
    from: above_horizon
    id: sunset
  - platform: state
    entity_id: media_player.tv
    to: playing
    id: tv_playing
  condition:
  - condition: or
    conditions:
    - condition: trigger
      id: manual
    - condition: and
      conditions:
      - condition: state
        entity_id: sun.sun
        state: below_horizon
      - condition: state
        entity_id: input_boolean.guest_mode_lm
        state: 'off'
      - condition: time
        after: '18:00:00'
      - condition: state
        entity_id: media_player.tv
        state: playing
  action:
  - if:
    - condition: not
      conditions:
      - condition: trigger
        id: manual
    then:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.watching_tv
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.wind_down
      - input_boolean.bedtime
      - input_boolean.good_morning
      - input_boolean.good_night
  - service: script.adaptive_lighting_scene_mode
  - service: script.music_pause_house
  - service: scene.turn_on
    target:
      entity_id: scene.lr_watching_tv
    data:
      transition: 3
  mode: single
