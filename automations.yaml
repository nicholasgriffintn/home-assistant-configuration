- id: adaptive_lighting_sleep_mode_follows_bedtime
  alias: Adaptive Lighting sleep mode follows bedtime
  description: Keep Adaptive Lighting sleep mode aligned with the bedtime helper.
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.bedtime
    - input_boolean.guest_mode_lm
  conditions:
  - condition: state
    entity_id: input_boolean.good_morning
    state: 'off'
  - condition: state
    entity_id: input_boolean.good_night
    state: 'off'
  - condition: state
    entity_id: input_boolean.wind_down
    state: 'off'
  - condition: state
    entity_id: input_boolean.watching_tv
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.bedtime
        state: 'on'
      - condition: state
        entity_id: input_boolean.guest_mode_lm
        state: 'off'
      sequence:
      - service: script.adaptive_lighting_sleep_mode
    - conditions:
      - condition: state
        entity_id: input_boolean.bedtime
        state: 'off'
      sequence:
      - service: script.adaptive_lighting_day_mode
